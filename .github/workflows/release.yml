name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build -w ai-provider-bridge

      - run: npm pack -w ai-provider-bridge

      - name: Create or update GitHub Release with tarball
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" \
              ./packages/ai-provider-bridge/ai-provider-bridge-*.tgz \
              --clobber
          else
            gh release create "${{ github.ref_name }}" \
              ./packages/ai-provider-bridge/ai-provider-bridge-*.tgz \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
